#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ Brand ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
  - model: authentik_brands.brand
    id: brand
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      domain: !Context global.domain
    attrs:
      default: !Context global.default
      branding_title: !Context global.title
      flow_authentication: !If [!Context global.uninstall, null, !KeyOf authentication-flow]
      flow_invalidation: !If [!Context global.uninstall, null, !KeyOf invalidation-flow]
      flow_user_settings: !If [!Context global.uninstall, null, !KeyOf user-settings-flow]
      flow_recovery: !If [!Condition [AND,
                                       !Condition [NOR, !Context global.uninstall],
                                       !Context recovery.enabled],
                           !KeyOf recovery-flow,
                           null]
      attributes:
        warning: |
          Please do not edit any of the settings defined here directly.
          Edit the ABB Bootstrap blueprint context instead.
        goauthentik.io/user/can-change-email: !If [!Context global.user.can_change_email, true, false]
        goauthentik.io/user/can-change-username: !If [!Context global.user.can_change_username, true, false]
        goauthentik.io/user/can-change-name: !If [!Context global.user.can_change_name, true, false]
        abb:
          email:
            case_sensitive_match: !If [!Context global.email.case_sensitive_match, true, false]
          username:
            case_sensitive_match: !If [!Context global.username.case_sensitive_match, true, false]
