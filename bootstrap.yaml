version: 1
metadata:
  name: ABB - Bootstrap
context:
  global.uninstall: false
  # TODO: Add more fallbacks when
  # https://github.com/goauthentik/authentik/pull/20610 is merged
  # Must not be changed after first install and must be a valid domain name
  global.domain: !Env [AUTHENTIK_HOST_BROWSER, example.com]
  # The bootstrap blueprint instance namespace. Used to prefix all created models.
  # Must not be changed after first install and must be sluggable
  global.namespace: main
  # Whether to set the brand created by this blueprint as default.
  # Note: blueprint will fail if another brand is already set as default
  global.default: false
  global.title: !Context [global.domain, ABB - Bootstrap] # The brand title
  # TODO: Due to a bug this must be kept turned on. See:
  # https://github.com/goauthentik/authentik/issues/20456
  global.email.require_confirmation_when_changed: true
  global.email.confirmation.subject: !Format ["%s - Confirm your email", !Context [global.domain, Authentik]]
  global.email.token_expiration: minutes=30
  # Email case-sensitiveness is only applied at a brand level, not per user.
  # NOTE: It is recommended to keep this setting set to `false` for best
  # compatibility with other apps
  global.email.case_sensitive_match: false
  # Username case-sensitiveness is only applied at a brand level, not per user.
  # NOTE: It is recommended to keep this setting set to `false` for best
  # compatibility with other apps
  global.username.case_sensitive_match: false
  global.passwords.min_length: 8
  global.passwords.require_lowercase: true
  global.passwords.require_uppercase: true
  global.passwords.require_digit: true
  global.passwords.require_special_character: false
  global.passwords.prevent_weak_passwords: true
  global.passwords.prevent_compromised_passwords: true
  global.user.can_change_email: true
  global.user.can_change_username: true
  global.user.can_change_name: true
  authentication.name: !Format ["Login to %s", !Context [global.domain, Authentik]]
  authentication.title: !Format ["Login to %s", !Context [global.domain, Authentik]]
  authentication.user_fields:
    - email
    - username
    # - upn
  authentication.show_matched_user: true
  authentication.show_remember_me: false
  # Case-sensitiveness when matching usernames, emails, etc in identity stages.
  # NOTE: It is recommended to keep this setting synced with the
  # `global.username.case_sensitive_match` and `global.username.case_sensitive_match`.
  authentication.case_sensitive_match: !Condition [OR, !Context global.email.case_sensitive_match, !Context global.username.case_sensitive_match]
  authentication.show_password_on_separate_stage: true
  authentication.allow_showing_password_when_typing: true
  authentication.backends:
    - authentik.core.auth.InbuiltBackend
    # - authentik.sources.ldap.auth.LDAPBackend
    # - authentik.core.auth.TokenBackend
  authentication.session_duration: seconds=0
  invalidation.name: !Format ["Logout from %s", !Context [global.domain, Authentik]]
  invalidation.title: !Format ["Logout from %s", !Context [global.domain, Authentik]]
  invalidation.require_confirmation: true
  password_change.name: Change password
  password_change.title: Change password
  password_change.validate_current_password: true
  enrollment.name: !Format ["Create a %s account", !Context [global.domain, Authentik]]
  enrollment.title: !Format ["Create a %s account", !Context [global.domain, Authentik]]
  enrollment.enabled: true
  enrollment.require_invitation: true
  enrollment.create_users_as_external: true
  enrollment.add_users_to_group: null
  enrollment.create_users_as_inactive: false
  recovery.name: !Format ["Recover your %s account", !Context [global.domain, Authentik]]
  recovery.title: !Format ["Recover your %s account", !Context [global.domain, Authentik]]
  recovery.email.subject: !Format ["Recover your %s account", !Context [global.domain, Authentik]]
  recovery.enabled: true
  user_settings.name: !Format ["Update your %s account", !Context [global.domain, Authentik]]
  user_settings.title: !Format ["Update your %s account", !Context [global.domain, Authentik]]
  prompts.email.position: 10
  prompts.username.position: 20
  prompts.first_name.position: 30
  prompts.last_name.position: 40
  prompts.locale.position: 50
  prompts.password.position: 60
  prompts.password_repeat.position: 70
  # TODO: Due to a bug all notification transport methods must all either enabled
  # or disabled. If some are enabled and some not - the blueprint will fail. See:
  # https://github.com/goauthentik/authentik/issues/20449
  notifications.configuration_error.transports.email: true
  notifications.configuration_error.transports.ui: true
  notifications.configuration_error.severity: alert
  notifications.configuration_error.notification_group: authentik Admins
entries:
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ Prompts ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
  - model: authentik_stages_prompt.prompt
    id: username-prompt
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-username-prompt", !Context global.namespace]
    attrs:
      # Type is `text`, because `username` type checks for case-sensitive matches,
      # which may be undesired.
      # The uniqueness validation is handled by the `unique-username-expression-policy`,
      # similar to how it is done for the email prompt.
      # See https://github.com/goauthentik/authentik/issues/5844 for more context
      type: text
      field_key: username
      label: Username
      placeholder: Username
      placeholder_expression: false
      initial_value: |
        if user.is_anonymous:
          return ''
        return user.username
      initial_value_expression: true
      required: true
      order: !Context prompts.username.position
  - model: authentik_stages_prompt.prompt
    id: email-prompt
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-email-prompt", !Context global.namespace]
    attrs:
      type: email
      field_key: email
      label: Email
      placeholder: Email
      placeholder_expression: false
      initial_value: |
        if user.is_anonymous:
          return ''
        return user.email
      initial_value_expression: true
      required: true
      order: !Context prompts.email.position
  - model: authentik_stages_prompt.prompt
    id: first-name-prompt
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-first-name-prompt", !Context global.namespace]
    attrs:
      type: text
      field_key: first_name
      label: First name
      placeholder: First name
      placeholder_expression: false
      initial_value: |
        if user.is_anonymous:
          return ''
        return user.name.split(" ")[0]
      initial_value_expression: true
      required: true
      order: !Context prompts.first_name.position
  - model: authentik_stages_prompt.prompt
    id: last-name-prompt
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-last-name-prompt", !Context global.namespace]
    attrs:
      type: text
      field_key: last_name
      label: Last name
      placeholder: Last name
      placeholder_expression: false
      initial_value: |
        if user.is_anonymous:
          return ''
        return user.name.split(" ")[-1]
      initial_value_expression: true
      required: true
      order: !Context prompts.last_name.position
  - model: authentik_stages_prompt.prompt
    id: locale-prompt
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-locale-prompt", !Context global.namespace]
    attrs:
      type: ak-locale
      field_key: attributes.settings.locale
      label: Locale
      placeholder: Locale
      placeholder_expression: false
      initial_value: |
        if user.is_anonymous:
          return ""
        return user.attributes.get("settings", {}).get("locale", "")
      initial_value_expression: true
      required: true
      order: !Context prompts.locale.position
  - model: authentik_stages_prompt.prompt
    id: password-prompt
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-password-prompt", !Context global.namespace]
    attrs:
      type: password
      field_key: password
      label: Password
      placeholder: Password
      placeholder_expression: false
      initial_value: ""
      initial_value_expression: false
      required: true
      order: !Context prompts.password.position
  - model: authentik_stages_prompt.prompt
    id: password-repeat-prompt
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-password-repeat-prompt", !Context global.namespace]
    attrs:
      type: password
      field_key: password_repeat
      label: Password (repeat)
      placeholder: Password (repeat)
      placeholder_expression: false
      initial_value: ""
      initial_value_expression: false
      required: true
      order: !Context prompts.password_repeat.position
  - model: authentik_stages_prompt.prompt
    id: logout-confirmation-prompt
    state: !If [!Condition [AND,
                            !Condition [NOR, !Context global.uninstall],
                            !Context invalidation.require_confirmation],
                present,
                absent]
    identifiers:
      name: !Format ["abb-%s-logout-confirmation-prompt", !Context global.namespace]
    attrs:
      type: static
      field_key: logout_confirmation
      label: "Are you sure you want to log out?"
      placeholder_value: ""
      placeholder_value_expression: false
      initial_value: ""
      initial_value_expression: false
      required: true
      order: 0
  - model: authentik_stages_prompt.prompt
    id: invitation-token-prompt
    state: !If [!Condition [AND,
                            !Condition [NOR, !Context global.uninstall],
                            !Context enrollment.enabled,
                            !Context enrollment.require_invitation],
                present,
                absent]
    identifiers:
      name: !Format ["abb-%s-invitation-token-prompt", !Context global.namespace]
    attrs:
      type: text
      # Must be named `token` for the invitation stage to pick it up
      field_key: token
      label: Invitaiton ID
      placeholder_value: Invitaiton ID
      placeholder_value_expression: false
      initial_value: ""
      initial_value_expression: false
      required: true
      order: 0
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ Property Mappings ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
  - model: authentik_providers_oauth2.scopemapping
    id: email-oauth-mapping
    state: !If [!Context global.uninstall, absent, present]
    conditions:
      - !Context global.email.require_confirmation_when_changed
    identifiers:
      name: !Format ["abb-%s-email-oauth-mapping", !Context global.namespace]
    attrs:
      scope_name: email
      description: "ABB - Email address"
      expression: |
        attributes = request.user.attributes
        return {
          "email": request.user.email,
          "email_verified": attributes.get("abb", {}).get("email", {}).get("confirmed", False)
        }
  - model: authentik_providers_oauth2.scopemapping
    id: email-oauth-mapping
    state: !If [!Context global.uninstall, absent, present]
    conditions:
      - !Condition [NOR, !Context global.email.require_confirmation_when_changed]
    identifiers:
      name: !Format ["abb-%s-email-oauth-mapping", !Context global.namespace]
    attrs:
      scope_name: email
      description: "ABB - Email address"
      expression: |
        attributes = request.user.attributes
        return {
          "email": request.user.email,
          # When email verification is turned off all emails are considered confirmed
          "email_verified": True
        }
  - model: authentik_providers_oauth2.scopemapping
    id: profile-oauth-mapping
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-profile-oauth-mapping", !Context global.namespace]
    attrs:
      scope_name: profile
      description: "ABB - General Profile Information"
      expression: |
        roles = [role.name for role in request.user.all_roles()]

        # For better RP compatibility, add a fictitious 'admin' role if the user
        # is a superuser in authentik
        if request.user.is_superuser and 'admin' not in roles:
          roles.append('admin')

        return {
          "name": request.user.name,
          "given_name": request.user.name.split(" ")[0],
          "preferred_username": request.user.username,
          "nickname": request.user.username,
          "groups": [group.name for group in request.user.all_groups()],
          "roles": roles,
        }
#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~ Policies ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~#
  - model: authentik_policies_expression.expressionpolicy
    id: is-superuser-expression-policy
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-is-superuser-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        if request.user.is_anonymous:
          return False
        return request.user.is_superuser
  - model: authentik_policies_expression.expressionpolicy
    id: missing-invitation-token-expression-policy
    state: !If [!Condition [AND,
                            !Condition [NOR, !Context global.uninstall],
                            !Context enrollment.enabled,
                            !Context enrollment.require_invitation],
                present,
                absent]
    identifiers:
      name: !Format ["abb-%s-missing-invitation-token-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        try:
          from authentik.flows.views.executor import SESSION_KEY_GET
          from authentik.stages.invitation.stage import QS_INVITATION_TOKEN_KEY, PLAN_CONTEXT_INVITATION_TOKEN

          session_dict = request.http_request.session.get(SESSION_KEY_GET, {})

          token = session_dict.get(
              QS_INVITATION_TOKEN_KEY,
              session_dict.get(
                  PLAN_CONTEXT_INVITATION_TOKEN,
                  request.context.get("token", None)))

          return not bool(token)
        except:
          return True
  - model: authentik_policies_expression.expressionpolicy
    id: valid-invitation-token-prompt-expression-policy
    state: !If [!Condition [AND,
                            !Condition [NOR, !Context global.uninstall],
                            !Context enrollment.enabled,
                            !Context enrollment.require_invitation],
                present,
                absent]
    identifiers:
      name: !Format ["abb-%s-valid-invitation-token-prompt-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        is_valid = False

        try:
          from uuid import UUID
          token = request.context["prompt_data"]["token"]
          is_valid = UUID(str(token)).version == 4
        except:
          pass

        if not is_valid:
          ak_message("Invalid invitation ID")
        return is_valid
  - model: authentik_policies_expression.expressionpolicy
    id: unique-email-expression-policy
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-unique-email-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        case_sensitive_match = request.http_request.brand.attributes \
          .get("abb", {}) \
          .get("email", {}) \
          .get("case_sensitive_match", False)

        email = request.context["prompt_data"]["email"]
        existing_user = ak_user_by(**{"email" if case_sensitive_match else "email__iexact": email})
        current_user = request.user

        if existing_user and (current_user.is_anonymous or current_user != existing_user):
          ak_message("This email is already in use.")
          return False
        return True
  - model: authentik_policies_expression.expressionpolicy
    id: unique-username-expression-policy
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-unique-username-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        case_sensitive_match = request.http_request.brand.attributes \
          .get("abb", {}) \
          .get("username", {}) \
          .get("case_sensitive_match", False)

        username = request.context["prompt_data"]["username"]
        existing_user = ak_user_by(**{"username" if case_sensitive_match else "username__iexact": username})
        current_user = request.user

        if existing_user and (current_user.is_anonymous or current_user != existing_user):
          ak_message("This username is already in use.")
          return False
        return True
  - model: authentik_policies_expression.expressionpolicy
    id: valid-name-parts-expression-policy
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-valid-name-parts-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        from authentik.stages.prompt.models import Prompt

        errors = False
        for key, value in request.context["prompt_data"].items():
          if key.endswith("name") and isinstance(value, (str,)):
            prompt = Prompt.objects.filter(field_key=key).first()
            label = prompt.label if prompt else key
            if len(value) < 2:
              ak_message(f"{label} must be longer than 1 character")
              errors = True

        return not errors
  - model: authentik_policies_expression.expressionpolicy
    id: valid-username-expression-policy
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-valid-username-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        username = request.context["prompt_data"]["username"]
        match = regex_match(username, r"^[a-zA-Z][a-zA-Z0-9-_]{0,18}[a-zA-Z0-9]$")

        if not match:
          ak_message("Invalid username. Use 2-20 characters (a-Z, 0-9, -, _). Must start with a letter and end with a letter or number.")
        return match
  - model: authentik_policies_expression.expressionpolicy
    id: strip-fields-expression-policy
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-strip-fields-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        for key, value in request.context["prompt_data"].items():
          if isinstance(value, (str,)):
            request.context["prompt_data"][key] = value.strip()
        return True
  - model: authentik_policies_expression.expressionpolicy
    id: create-name-from-parts-expression-policy
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-create-name-from-parts-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        first_name = request.context["prompt_data"].pop("first_name")
        last_name = request.context["prompt_data"].pop("last_name")
        request.context["prompt_data"]["name"] = " ".join([first_name, last_name])
        return True
  - model: authentik_policies_expression.expressionpolicy
    id: copy-prompt-data-email-to-flow-plan-context-expression-policy
    state: !If [!Condition [AND,
                            !Condition [NOR, !Context global.uninstall],
                            !Context global.email.require_confirmation_when_changed],
                present,
                absent]
    identifiers:
      name: !Format ["abb-%s-copy-prompt-data-email-to-flow-plan-context-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        # Doing this tells an email confirmation stage to send an email
        # to the email in prompt_data rather than the current user configured email
        prompt_data = request.context.get("prompt_data", {})
        if "email" in prompt_data:
          request.context["flow_plan"].context["email"] = prompt_data["email"]
        return True
  - model: authentik_policies_expression.expressionpolicy
    id: set-email-confirmed-attribute-to-false-expression-policy
    state: !If [!Condition [AND,
                            !Condition [NOR, !Context global.uninstall],
                            !Context global.email.require_confirmation_when_changed],
                present,
                absent]
    identifiers:
      name: !Format ["abb-%s-set-email-confirmed-attribute-to-false-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        email_attributes = request.context \
          .setdefault("prompt_data", {}) \
          .setdefault("attributes", {}) \
          .setdefault("abb", {}) \
          .setdefault("email", {})

        email_attributes["confirmed"] = False
        return True
  - model: authentik_policies_expression.expressionpolicy
    id: set-email-confirmed-attribute-to-true-expression-policy
    state: !If [!Condition [AND,
                            !Condition [NOR, !Context global.uninstall],
                            !Context global.email.require_confirmation_when_changed],
                present,
                absent]
    identifiers:
      name: !Format ["abb-%s-set-email-confirmed-attribute-to-true-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        email_attributes = request.context \
          .setdefault("prompt_data", {}) \
          .setdefault("attributes", {}) \
          .setdefault("abb", {}) \
          .setdefault("email", {})

        email_attributes["confirmed"] = True
        return True
  - model: authentik_policies_expression.expressionpolicy
    id: email-confirmed-attribute-expression-policy
    state: !If [!Condition [AND,
                            !Condition [NOR, !Context global.uninstall],
                            !Context global.email.require_confirmation_when_changed],
                present,
                absent]
    identifiers:
      name: !Format ["abb-%s-email-confirmed-attribute-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        if request.user.is_anonymous:
          return False

        # Service accounts are exempt from email confirmations
        if request.user.type in ("service_account", "internal_service_account"):
          return True

        confirmed = request.user.attributes \
          .get("abb", {}) \
          .get("email", {}) \
          .get("confirmed", False)

        return bool(confirmed)
  - model: authentik_policies_expression.expressionpolicy
    id: email-changed-expression-policy
    state: !If [!Condition [AND,
                            !Condition [NOR, !Context global.uninstall],
                            !Context global.email.require_confirmation_when_changed],
                present,
                absent]
    identifiers:
      name: !Format ["abb-%s-email-changed-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        if request.user.is_anonymous:
          return False

        prompt_data = request.context.get("prompt_data", {})
        if "email" in prompt_data and prompt_data["email"] != request.user.email:
          return True

        return False
  - model: authentik_policies_expression.expressionpolicy
    id: user-settings-autorization-expression-policy
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-user-settings-autorization-expression-policy", !Context global.namespace]
    attrs:
      expression: |
        from authentik.core.models import (
            USER_ATTRIBUTE_CHANGE_EMAIL,
            USER_ATTRIBUTE_CHANGE_NAME,
            USER_ATTRIBUTE_CHANGE_USERNAME
        )
        prompt_data = request.context.get("prompt_data")

        if not request.user.group_attributes(request.http_request).get(
            USER_ATTRIBUTE_CHANGE_EMAIL, request.http_request.tenant.default_user_change_email
        ):
            if "email" in prompt_data and prompt_data["email"] != request.user.email:
                ak_message("Not allowed to change email address.")
                return False

        if not request.user.group_attributes(request.http_request).get(
            USER_ATTRIBUTE_CHANGE_NAME, request.http_request.tenant.default_user_change_name
        ):
            if "name" in prompt_data and prompt_data["name"] != request.user.name:
                ak_message("Not allowed to change name.")
                return False

        if not request.user.group_attributes(request.http_request).get(
            USER_ATTRIBUTE_CHANGE_USERNAME, request.http_request.tenant.default_user_change_username
        ):
            if "username" in prompt_data and prompt_data["username"] != request.user.username:
                ak_message("Not allowed to change username.")
                return False

        return True
  - model: authentik_policies_event_matcher.eventmatcherpolicy
    id: configuration-error-event-matcher-policy
    state: !If [!Condition [AND,
                            !Condition [NOR, !Context global.uninstall],
                            !Condition [OR,
                                        !Context notifications.configuration_error.transports.email,
                                        !Context notifications.configuration_error.transports.ui]],
                present,
                absent]
    identifiers:
      name: !Format ["abb-%s-configuration-error-event-matcher-policy", !Context global.namespace]
    attrs:
      action: configuration_error
  - model: authentik_policies_password.passwordpolicy
    id: password-policy
    state: !If [!Context global.uninstall, absent, present]
    identifiers:
      name: !Format ["abb-%s-password-policy", !Context global.namespace]
    attrs:
      password_field: password
      check_have_i_been_pwned: !Context global.passwords.prevent_compromised_passwords
      check_zxcvbn: !Context global.passwords.prevent_weak_passwords
      check_static_rules: true
      amount_lowercase: !If [!Context global.passwords.require_lowercase, 1, 0]
      amount_uppercase: !If [!Context global.passwords.require_uppercase, 1, 0]
      amount_digits: !If [!Context global.passwords.require_digit, 1, 0]
      amount_symbols: !If [!Context global.passwords.require_special_character, 1, 0]
      length_min: !Context global.passwords.min_length
      error_message: !Format ["Password must be at least %s characters long%s%s%s%s%s%s%s%s.",
                              !Context global.passwords.min_length,
                              !If [!Condition [OR,
                                               !Context global.passwords.require_lowercase,
                                               !Context global.passwords.require_uppercase,
                                               !Context global.passwords.require_digit,
                                               !Context global.passwords.require_special_character],
                                  " and must contain ",
                                  ""],
                              !If [!Context global.passwords.require_lowercase,
                                   "a lowercase letter",
                                   ""],
                              !If [!Condition [AND,
                                               !Context global.passwords.require_lowercase,
                                               !Context global.passwords.require_uppercase],
                                   !If [!Condition [OR,
                                                    !Context global.passwords.require_digit,
                                                    !Context global.passwords.require_special_character],
                                        ", ",
                                        " and "],
                                   ""],
                              !If [!Context global.passwords.require_uppercase,
                                   "an uppercase letter",
                                   ""],
                              !If [!Condition [AND,
                                               !Condition [OR,
                                                           !Context global.passwords.require_lowercase,
                                                           !Context global.passwords.require_uppercase],
                                               !Context global.passwords.require_digit],
                                   !If [!Context global.passwords.require_special_character,
                                        ", ",
                                        " and "],
                                   ""],
                              !If [!Context global.passwords.require_digit,
                                   "a digit",
                                   ""],
                              !If [!Condition [AND,
                                               !Condition [OR,
                                                           !Context global.passwords.require_lowercase,
                                                           !Context global.passwords.require_uppercase,
                                                           !Context global.passwords.require_digit],
                                               !Context global.passwords.require_special_character],
                                   " and ",
                                   ""],
                              !If [!Context global.passwords.require_special_character,
                                   "a special character",
                                   ""]]
