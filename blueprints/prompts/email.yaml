  id: email-prompt
  identifiers:
    field_key: email
    label: Email
  attrs:
    name: email
    order: !Context order
    initial_value: |
      if not user.is_anonymous:
          return user.email
      return ""
    initial_value_expression: true
    placeholder: Email
    placeholder_expression: false
    required: true
    type: email
